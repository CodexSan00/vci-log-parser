version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: vci_postgres_container
    environment:
      POSTGRES_USER: workshop_user
      POSTGRES_PASSWORD: workshop_password123
      POSTGRES_DB: vcilog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: